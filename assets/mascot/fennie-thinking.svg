<?xml version="1.0" encoding="UTF-8"?>
<!--
  Fennie the Fox — THINKING pose
  Shown when child takes too long. Paw to chin, eyes look up.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" fill="none">
  <ellipse cx="120" cy="170" rx="78" ry="56" fill="#D87C5A"/>
  <ellipse cx="120" cy="180" rx="46" ry="34" fill="#FDF0D5"/>
  <path d="M195 160 Q235 130 220 100 Q210 130 190 145 Z" fill="#D87C5A"/>
  <!-- Paw to chin -->
  <ellipse cx="138" cy="140" rx="14" ry="10" fill="#D87C5A"/>
  <circle cx="148" cy="138" r="6" fill="#D87C5A"/>
  <circle cx="151" cy="135" r="2" fill="#FDF0D5"/>
  <!-- Head -->
  <circle cx="120" cy="100" r="62" fill="#D87C5A"/>
  <path d="M82 110 Q120 142 158 110 Q158 138 120 150 Q82 138 82 110 Z" fill="#FDF0D5"/>
  <path d="M70 60 L60 18 L96 52 Z" fill="#D87C5A"/>
  <path d="M170 60 L180 18 L144 52 Z" fill="#D87C5A"/>
  <path d="M76 56 L68 30 L92 52 Z" fill="#FF8A65"/>
  <path d="M164 56 L172 30 L148 52 Z" fill="#FF8A65"/>
  <!-- Eyes looking up-right -->
  <circle cx="103" cy="92" r="6" fill="#3D2C1E"/>
  <circle cx="135" cy="92" r="6" fill="#3D2C1E"/>
  <circle cx="105" cy="90" r="2" fill="#FFF8EC"/>
  <circle cx="137" cy="90" r="2" fill="#FFF8EC"/>
  <ellipse cx="120" cy="120" rx="9" ry="6" fill="#3D2C1E"/>
  <!-- Curious mouth -->
  <path d="M110 132 Q120 138 130 132" stroke="#3D2C1E" stroke-width="3" stroke-linecap="round" fill="none"/>
  <!-- Thought bubble -->
  <circle cx="178" cy="42" r="14" fill="#FDF0D5" stroke="#6B5544" stroke-width="2"/>
  <circle cx="160" cy="64" r="6" fill="#FDF0D5" stroke="#6B5544" stroke-width="2"/>
  <circle cx="152" cy="76" r="3" fill="#FDF0D5" stroke="#6B5544" stroke-width="2"/>
  <text x="178" y="48" text-anchor="middle" font-family="serif" font-size="18" fill="#6B5544">?</text>
  <circle cx="78" cy="118" r="8" fill="#F4A5B5" opacity="0.6"/>
  <circle cx="162" cy="118" r="8" fill="#F4A5B5" opacity="0.6"/>
</svg>
