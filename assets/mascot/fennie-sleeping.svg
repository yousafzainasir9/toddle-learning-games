<?xml version="1.0" encoding="UTF-8"?>
<!--
  Fennie the Fox — SLEEPING pose
  Used for session-end / "story time is over". Curled up.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" fill="none">
  <!-- Curled body -->
  <ellipse cx="120" cy="172" rx="98" ry="46" fill="#D87C5A"/>
  <!-- Tail curled around -->
  <path d="M40 175 Q30 160 38 145 Q50 140 60 150 Q40 158 40 175 Z" fill="#D87C5A"/>
  <path d="M44 165 Q56 158 58 152" stroke="#FDF0D5" stroke-width="6" stroke-linecap="round"/>
  <!-- Belly -->
  <ellipse cx="135" cy="180" rx="60" ry="22" fill="#FDF0D5"/>
  <!-- Head resting on body -->
  <circle cx="170" cy="142" r="48" fill="#D87C5A"/>
  <path d="M140 152 Q170 178 200 152 Q200 174 170 184 Q140 174 140 152 Z" fill="#FDF0D5"/>
  <!-- Folded ears -->
  <path d="M150 110 L142 84 L168 108 Z" fill="#D87C5A"/>
  <path d="M192 110 L200 84 L174 108 Z" fill="#D87C5A"/>
  <path d="M154 108 L150 92 L164 106 Z" fill="#FF8A65"/>
  <path d="M188 108 L192 92 L178 106 Z" fill="#FF8A65"/>
  <!-- Closed eyes -->
  <path d="M154 138 Q160 144 166 138" stroke="#3D2C1E" stroke-width="4" stroke-linecap="round" fill="none"/>
  <path d="M174 138 Q180 144 186 138" stroke="#3D2C1E" stroke-width="4" stroke-linecap="round" fill="none"/>
  <ellipse cx="170" cy="156" rx="7" ry="5" fill="#3D2C1E"/>
  <!-- Z's -->
  <text x="80" y="80" font-family="serif" font-size="28" fill="#7FB8E0" opacity="0.7">z</text>
  <text x="95" y="60" font-family="serif" font-size="36" fill="#7FB8E0" opacity="0.8">Z</text>
  <text x="118" y="36" font-family="serif" font-size="44" fill="#7FB8E0">Z</text>
</svg>
