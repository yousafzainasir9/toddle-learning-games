  <ellipse cx="175" cy="100" rx="14" ry="22" fill="#D87C5A" transform="rotate(-20 175 100)"/>
  <circle cx="60" cy="76" r="9" fill="#D87C5A"/>
  <circle cx="180" cy="76" r="9" fill="#D87C5A"/>
